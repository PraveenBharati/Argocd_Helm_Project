apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Values.app.namespace }}
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Praveen | Cloud & DevOps</title>

      <style>
        body {
          margin: 0;
          font-family: Arial, Helvetica, sans-serif;
          background: linear-gradient(135deg, #141e30, #243b55);
          color: white;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          text-align: center;
        }

        .container {
          background: rgba(255,255,255,0.08);
          padding: 40px;
          border-radius: 12px;
          box-shadow: 0 8px 25px rgba(0,0,0,0.4);
          backdrop-filter: blur(10px);
          max-width: 700px;
        }

        h1 {
          font-size: 42px;
          color: #00ffd5;
          margin-bottom: 10px;
        }

        h2 {
          font-weight: normal;
          color: #e0e0e0;
        }

        p {
          font-size: 18px;
          line-height: 1.6;
          margin-top: 20px;
        }

        .badge {
          margin-top: 25px;
          padding: 10px 20px;
          background: #00ffd5;
          color: #003333;
          border-radius: 25px;
          font-weight: bold;
          display: inline-block;
        }

        footer {
          margin-top: 30px;
          font-size: 14px;
          color: #cccccc;
        }
      </style>
    </head>

    <body>
      <div class="container">
        <h1>🚀 Praveen Bharati</h1>
        <h2>Cloud | DevOps Engineer | Kubernetes Enthusiast</h2>

        <p>
          This application is deployed using Kubernetes and managed through
          modern DevOps practices including Docker, 
          Helm charts, and ArgoCD GitOps workflows.
        </p>

        <div class="badge">
          ✅ Successfully Deployed via Helm + ArgoCD
        </div>

        <footer>
          Built with ❤️ using Kubernetes • AWS • DevOps
        </footer>
      </div>
    </body>
    </html>
